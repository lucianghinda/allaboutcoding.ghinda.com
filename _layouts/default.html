<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta charset="utf-8">
  <script>
    // Set the theme before first paint to avoid a flash of the wrong theme.
    (function () {
      try {
        var stored = localStorage.getItem("theme");
        var dark = stored ? stored === "dark"
          : window.matchMedia("(prefers-color-scheme: dark)").matches;
        if (dark) document.documentElement.classList.add("dark");
      } catch (e) {}
    })();
  </script>
  {% seo %}
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/rss.xml' | absolute_url }}">
  <link rel="stylesheet" href="{{ "/assets/css/styles.css" | relative_url }}">
  <link rel="stylesheet" href="{{ "/assets/css/syntax-highlighting.css" | relative_url }}">
</head>

<body class="m-auto max-w-2xl p-10 font-mono antialiased bg-stone-100 dark:bg-neutral-800">
  <button id="theme-toggle" type="button" aria-label="Toggle light and dark theme"
    class="fixed top-4 right-4 z-10 grid size-9 place-items-center rounded-md border border-stone-300 dark:border-stone-600 bg-stone-100/80 dark:bg-neutral-800/80 text-stone-600 dark:text-stone-300 backdrop-blur-sm transition-colors hover:text-amber-600 hover:border-amber-500 dark:hover:text-amber-400 dark:hover:border-amber-500">
    <svg class="size-5 dark:hidden" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" />
    </svg>
    <svg class="size-5 hidden dark:block" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" />
    </svg>
  </button>

  {% include head.html %}
  {{ content }}
  {% include footer.html %}

  <script>
    (function () {
      var root = document.documentElement;
      var btn = document.getElementById("theme-toggle");
      if (btn) {
        btn.addEventListener("click", function () {
          var isDark = root.classList.toggle("dark");
          try { localStorage.setItem("theme", isDark ? "dark" : "light"); } catch (e) {}
        });
      }
      // Follow the OS setting until the visitor makes an explicit choice.
      window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function (e) {
        try { if (!localStorage.getItem("theme")) root.classList.toggle("dark", e.matches); } catch (err) {}
      });
    })();
  </script>
</body>

</html>
